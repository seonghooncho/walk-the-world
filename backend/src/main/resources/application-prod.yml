spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 3600000
  refresh-token-expiry: 604800000

aws:
  s3:
    bucket: ${S3_BUCKET}
    region: ${AWS_REGION}

ai:
  api-base-url: ${AI_API_BASE_URL:}
